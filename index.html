<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Nube de Wilson | Timeline en Vivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050a05;
            --accent-data: #2196F3;    /* Azul */
            --accent-capsula: #4CAF50; /* Verde */
            --accent-senalsj: #FFD700; /* Oro */
            --accent-musica: #E91E63;  /* Rosa/Fucsia */
            --highlight: #d4e157;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* VIDEO DE FONDO - SIEMPRE ACTIVO */
        .video-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #000; }
        .player-frame { width: 100%; height: 100%; border: none; position: absolute; display: none; }
        .player-frame.active { display: block; }

        /* OVERLAY TRASLÚCIDO */
        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        header { background: rgba(12, 20, 12, 0.8); padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(212, 225, 87, 0.3); }
        .logo { font-family: 'Bebas Neue', cursive; font-size: 2rem; color: var(--highlight); margin: 0; }

        /* FILTROS DE CATEGORÍA */
        .filter-bar { display: flex; justify-content: center; gap: 10px; padding: 15px; background: rgba(0,0,0,0.5); }
        .filter-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; font-weight: bold; transition: 0.3s; }
        .filter-btn.active { background: var(--highlight); color: #000; border-color: var(--highlight); }

        /* TIMELINE SCROLLABLE */
        #timeline { flex: 1; overflow-y: auto; padding: 20px 5%; scroll-behavior: smooth; }
        
        .news-card {
            background: rgba(255, 255, 255, 0.05);
            border-left: 5px solid #ccc;
            margin-bottom: 40px;
            padding: 25px;
            border-radius: 0 15px 15px 0;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            animation: fadeInUp 0.5s ease;
        }

        .news-card.data { border-left-color: var(--accent-data); }
        .news-card.capsula { border-left-color: var(--accent-capsula); }
        .news-card.senalsj { border-left-color: var(--accent-senalsj); }
        .news-card.musica { border-left-color: var(--accent-musica); }

        .cat-tag { font-size: 0.7rem; text-transform: uppercase; font-weight: 700; margin-bottom: 10px; display: block; letter-spacing: 1px; }
        .news-card h2 { font-family: 'Bebas Neue'; font-size: 2.5rem; margin: 10px 0; line-height: 1; }
        .news-card p { font-size: 1.1rem; line-height: 1.6; opacity: 0.9; }
        .news-img { width: 100%; border-radius: 10px; margin: 15px 0; border: 1px solid rgba(255,255,255,0.1); }

        /* BOTÓN COMPARTIR */
        .share-btn { background: none; border: 1px solid rgba(212, 225, 87, 0.5); color: var(--highlight); padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; margin-top: 15px; display: flex; align-items: center; gap: 8px; }
        .share-btn:hover { background: var(--highlight); color: #000; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* FOOTER SPONSORS PEQUEÑO */
        .mini-sponsor { position: fixed; bottom: 20px; right: 20px; width: 150px; height: 80px; background: rgba(0,0,0,0.8); border: 1px solid var(--highlight); border-radius: 8px; overflow: hidden; z-index: 100; }
        
        /* TICKER */
        .ticker-wrap { background: #000; height: 30px; overflow: hidden; }
        .ticker { white-space: nowrap; animation: ticker 30s linear infinite; padding-top: 5px; color: var(--highlight); font-size: 0.85rem; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div class="video-background">
        <iframe id="player-yt" class="player-frame active" src="https://www.youtube.com/embed/36YnV9STBqc?autoplay=1&mute=1&playlist=36YnV9STBqc&loop=1&enablejsapi=1" allow="autoplay; fullscreen"></iframe>
        <iframe id="player-kick" class="player-frame" src="https://player.kick.com/lanubedewilson" allow="autoplay; fullscreen"></iframe>
    </div>

    <div class="app-container">
        <header>
            <h1 class="logo">LA NUBE <span>DE WILSON</span></h1>
            <div style="display: flex; gap: 10px;">
                <button onclick="switchSource('yt')" id="btn-yt" style="background:var(--highlight); border:none; padding:5px 10px; cursor:pointer;">MÚSICA</button>
                <button onclick="switchSource('kick')" id="btn-kick" style="background:#fff; border:none; padding:5px 10px; cursor:pointer;">LIVE</button>
            </div>
        </header>

        <div class="ticker-wrap"><div class="ticker" id="ticker-content">CARGANDO ÚLTIMAS NOTICIAS...</div></div>

        <div class="filter-bar

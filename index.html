<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Nube de Wilson | v2.0 Timeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050a05;
            --highlight: #d4e157;
            --accent-green: #9fb69f;
            --sj-gold: #ffcc00;
            --capsula-blue: #00d4ff;
            --musica-pink: #ff007a;
            --white-bone: #f5f5f5;
        }

        * { box-sizing: border-box; }
        body { 
            background-color: var(--bg-dark); 
            color: var(--white-bone); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            height: 100vh;
        }

        /* HEADER Y SEÑALES */
        header { 
            background-color: #000; 
            padding: 10px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--highlight);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-family: 'Bebas Neue', cursive; font-size: 2rem; color: var(--highlight); margin: 0; }
        .logo span { color: var(--accent-green); font-weight: normal; }

        .signal-selector { display: flex; gap: 5px; background: #111; padding: 5px; border-radius: 8px; }
        .btn-signal { 
            background: none; border: none; color: #555; font-size: 0.7rem; 
            font-weight: bold; padding: 6px 12px; cursor: pointer; border-radius: 4px; 
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-signal.active { background: var(--highlight); color: #000; }
        /* EL LATIDO ROJO */
        .dot { 
            width: 10px; height: 10px; background-color: #ff0000; border-radius: 50%; 
            display: inline-block; margin-right: 8px; vertical-align: middle;
            box-shadow: 0 0 12px #ff0000; animation: pulse-fade 1.5s infinite ease-in-out; 
        }
        .dot.live { 
            background-color: #00ff00; 
            box-shadow: 0 0 15px #00ff00; 
        }
        @keyframes pulse-fade { 
            0%, 100% { opacity: 0.3; transform: scale(0.8); } 
            50% { opacity: 1; transform: scale(1.2); } 
        }
        /* VIDEO PLAYER PERSISTENTE */
        .main-stage { position: relative; width: 100%; background: #000; aspect-ratio: 16/9; max-height: 50vh; }
        .player-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
        .player-frame.active { display: block; }

        /* TICKER */
        .ticker-wrap { background: #000; border-bottom: 1px solid #1a261a; overflow: hidden; padding: 6px 0; }
        .ticker { display: inline-block; white-space: nowrap; animation: tickerMove 30s linear infinite; color: var(--highlight); font-weight: bold; font-size: 0.85rem; }
        @keyframes tickerMove { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* GRID DE SECCIONES (FILTROS) */
        .grid-filters { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 10px; padding: 20px 5%; background: linear-gradient(to bottom, #000, var(--bg-dark));
        }
        .filter-card { 
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; 
            border: 1px solid #222; cursor: pointer; text-align: center; transition: 0.3s;
        }
        .filter-card:hover { border-color: var(--highlight); background: rgba(212, 225, 87, 0.1); }
        .filter-card h3 { font-family: 'Bebas Neue'; margin: 0; font-size: 1.2rem; letter-spacing: 1px; }

        /* TIMELINE OVERLAY (EL CRISTAL) */
        #timeline-overlay {
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%;
            background: rgba(5, 10, 5, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 500; transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            overflow-y: auto; padding: 40px 5%;
        }
        #timeline-overlay.open { right: 0; }

        .close-timeline { 
            position: fixed; top: 20px; right: 20px; font-size: 2.5rem; 
            color: var(--highlight); cursor: pointer; z-index: 600; 
        }

        /* ESTILO DE NOTAS EN EL TIMELINE */
        .timeline-container { max-width: 700px; margin: 60px auto 0; border-left: 2px solid rgba(212, 225, 87, 0.3); padding-left: 30px; position: relative; }
        
        .note-card { 
            background: rgba(255,255,255,0.03); border-radius: 12px; padding: 20px; 
            margin-bottom: 40px; position: relative; border-left: 5px solid var(--highlight);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .note-card::before {
            content: ''; position: absolute; left: -41px; top: 25px; 
            width: 16px; height: 16px; background: var(--bg-dark); 
            border: 3px solid var(--highlight); border-radius: 50%;
        }
        
        /* Colores por categoría */
        .cat-data { border-left-color: var(--highlight); }
        .cat-senalsj { border-left-color: var(--sj-gold); }
        .cat-capsula { border-left-color: var(--capsula-blue); }
        .cat-musica { border-left-color: var(--musica-pink); }

        .note-img { width: auto; max-width: 80%; max-height: 350px; border-radius: 8px; margin: 0 auto 15px auto; display: block; object-fit: contain; }
        .note-title { font-family: 'Bebas Neue'; font-size: 2rem; margin: 0 0 10px 0; color: #fff; line-height: 1; }
        .note-content { font-size: 1rem; line-height: 1.6; color: var(--accent-green); font-weight: 300; }
        
        .share-bar { margin-top: 15px; display: flex; gap: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
        .share-btn { background: none; border: none; color: var(--highlight); cursor: pointer; font-size: 0.8rem; text-transform: uppercase; font-weight: bold; }

        /* SPONSORS */
        .sponsor-footer { padding: 20px; text-align: center; border-top: 1px solid #111; }
        #sponsor-ad { max-width: 250px; height: 60px; margin: 0 auto; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        @media (max-width: 768px) {
            .timeline-container { margin-left: 20px; }
            .note-title { font-size: 1.6rem; }
        }
        /* SIDEBAR DE VIBRAS */
        #vibe-sidebar {
            position: fixed; top: 0; right: -35%; width: 33.33%; height: 100%;
            background: rgba(10, 20, 10, 0.6); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); z-index: 1000;
            transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1);
            display: flex; flex-direction: column; padding: 80px 15px 20px;
            border-left: 1px solid rgba(212, 225, 87, 0.2);
        }
        #vibe-sidebar.open { right: 0; }
        
        .vibe-header { 
            font-family: 'Bebas Neue'; font-size: 1.5rem; color: var(--highlight); 
            margin-bottom: 25px; border-bottom: 1px solid var(--highlight); padding-bottom: 5px;
        }

        .vibe-item {
            padding: 15px 10px; margin-bottom: 10px; cursor: pointer;
            border-radius: 6px; transition: 0.3s; display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.03); border: 1px solid transparent;
        }
        .vibe-item:hover { background: rgba(212, 225, 87, 0.15); border-color: var(--highlight); }
        .vibe-item span { font-family: 'Bebas Neue'; font-size: 1.1rem; color: #fff; letter-spacing: 1px; }

        /* Ajuste para celulares */
        @media (max-width: 768px) {
            #vibe-sidebar { width: 45%; right: -50%; }
            #vibe-sidebar.open { right: 0; }
        }
    </style>
</head>
<body>

    <header>
        <h1 class="logo">LA NUBE <span>DE WILSON</span></h1>
        <div class="signal-selector">
            <button id="btn-kick" class="btn-signal" onclick="switchSignal('kick')"><span id="live-dot" class="dot"></span> STREAM</button>
            <button id="btn-vibe" class="btn-signal active" onclick="toggleVibeMenu()">SELECCIONA TU VIBRA</button>
        </div>
    </header>
    <div id="vibe-sidebar">
        <div class="vibe-header">SELECCIONA TU VIBRA</div>
        <div class="vibe-item" onclick="changeVibe('njqkg8o4C84', 'Rock 90s')"><div style="width:4px; height:20px; background:#ff8a00"></div><span>Rock 90s</span></div>
        <div class="vibe-item" onclick="changeVibe('c6JAn-IGX6o', 'Indie Folk')"><div style="width:4px; height:20px; background:#a2d149"></div><span>Indie Folk</span></div>
        <div class="vibe-item" onclick="changeVibe('b-bK2Vn3D38', 'Radio Pop')"><div style="width:4px; height:20px; background:#00d4ff"></div><span>Radio Pop</span></div>
        <div class="vibe-item" onclick="changeVibe('Zyqr_A8PibE', 'Energy Funk')"><div style="width:4px; height:20px; background:#ff007a"></div><span>Energy Funk</span></div>
        <div class="vibe-item" onclick="changeVibe('2Sn6nqruOB8', 'Rock & Pop')"><div style="width:4px; height:20px; background:#ffcc00"></div><span>Rock & Pop</span></div>
        <div class="vibe-item" onclick="changeVibe('r7eFY9YYTdE', 'Urban Hop')"><div style="width:4px; height:20px; background:#9d49d1"></div><span>Urban Hop</span></div>
        <div class="vibe-item" onclick="changeVibe('XDuiT2-esas', 'Radio Blues')"><div style="width:4px; height:20px; background:#496ed1"></div><span>Radio Blues</span></div>
        <button onclick="toggleVibeMenu()" style="margin-top:auto; background:none; border:1px solid #444; color:#888; padding:10px; cursor:pointer; font-size:0.7rem; border-radius:4px;">CERRAR DIAL</button>
    </div>
    <div class="main-stage">
        <iframe id="player-yt" class="player-frame active" src="https://www.youtube.com/embed/36YnV9STBqc?autoplay=1&mute=1&enablejsapi=1" allow="autoplay"></iframe>
        <iframe id="player-kick" class="player-frame" src="https://player.kick.com/lanubedewilson" allowfullscreen="true"></iframe>
    </div>

    <div class="ticker-wrap">
        <div class="ticker" id="main-ticker">CONECTANDO CON LA NUBE...</div>
    </div>

    <main class="grid-filters">
        <div class="filter-card" onclick="openTimeline('data')"><h3>+ DATA</h3></div>
        <div class="filter-card" onclick="openTimeline('capsula')"><h3>CÁPSULAS</h3></div>
        <div class="filter-card" onclick="openTimeline('senalsj')"><h3>SEÑAL SJ</h3></div>
        <div class="filter-card" onclick="openTimeline('musica')"><h3>MÚSICA</h3></div>
        <div class="filter-card" onclick="openTimeline('all')"><h3 style="color: var(--highlight);">TODO EL FEED</h3></div>
    </main>

    <div class="sponsor-footer">
        <div id="sponsor-ad">Cargando auspiciantes...</div>
    </div>

    <div id="timeline-overlay">
        <span class="close-timeline" onclick="closeTimeline()">×</span>
        <div class="timeline-container" id="timeline-content">
            </div>
    </div>

    <script>
        let allNews = [];
        let sponsors = [];

        // Cambiar entre señales sin recargar página
        function switchSignal(type) {
    const pk = document.getElementById('player-kick');
    const py = document.getElementById('player-yt');
    const bk = document.getElementById('btn-kick');
    const bv = document.getElementById('btn-vibe'); // <--- El nombre correcto

    if (type === 'kick') {
        pk.classList.add('active');
        py.classList.remove('active');
        bk.classList.add('active');
        bv.classList.remove('active');
        // Silenciamos YouTube para que no moleste al Stream
        py.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
    } else {
        py.classList.add('active');
        pk.classList.remove('active');
        bv.classList.add('active');
        bk.classList.add('active'); // Ojo, solo uno queda activo
        bk.classList.remove('active');
        // Le damos Play a la música al volver
        py.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
    }
}

        async function fetchData() {
            const newsUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQzBWeCou5kJh15fRReZ85IvkrYGDsWKwzBQjxaF50y9VuGXd2Sen6Aev-nBlLr7MbLjsdOMDYtlnsE/pub?output=csv&t=' + Date.now();
            const sponsorsUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQzBWeCou5kJh15fRReZ85IvkrYGDsWKwzBQjxaF50y9VuGXd2Sen6Aev-nBlLr7MbLjsdOMDYtlnsE/pub?gid=1982401975&single=true&output=csv&t=' + Date.now();
            
            try {
                const res = await fetch(newsUrl);
                const text = await res.text();
                allNews = text.split('\n').slice(1).filter(r => r.trim() !== '').reverse();
                
                const resSpo = await fetch(sponsorsUrl);
                const textSpo = await resSpo.text();
                sponsors = textSpo.split('\n').slice(1).filter(r => r.trim() !== '');
                startSponsors();
                // DETECTOR DE VIVO
        let isLive = allNews.some(row => row.split(',')[3]?.trim().toUpperCase() === 'VIVO');
        const dot = document.getElementById('live-dot');
        if (isLive) { 
            dot.classList.add('live'); 
        } else { 
            dot.classList.remove('live'); 
        }
                checkDeepLinking();
            } catch (e) { console.log(e); }
        }

        function openTimeline(category) {
            const container = document.getElementById('timeline-content');
            container.innerHTML = '';
            
            allNews.forEach((row, index) => {
                const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (col.length < 4) return;
                
                const title = col[0].replace(/"/g, '');
                const content = col[1].replace(/"/g, '');
                const status = col[3].trim().toLowerCase();
                const cat = (col[4] || 'data').trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s/g, "");
                const img = (col[5] || '').trim().replace(/"/g, '');
                const author = (col[2] || 'Redacción').replace(/"/g, '').trim();
                const noteId = `nota-${allNews.length - index}`;

                if (status === 'publicar' && (category === 'all' || cat === category)) {
                    const card = document.createElement('div');
                    card.className = `note-card cat-${cat}`;
                    card.id = noteId;
                    card.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                            <span style="color:var(--highlight); font-size:0.7rem; font-weight:bold; opacity:0.8;">[ ${cat.toUpperCase()} ]</span>
                            <span style="color:var(--accent-green); font-size:0.7rem; font-style:italic;">✍️ ${author}</span>
                        </div>
                        ${img ? `<img src="${img}" class="note-img">` : ''}
                        <h2 class="note-title">${title}</h2>
                        <div class="note-content">${content}</div>
                        <div class="share-bar">
                            <button class="share-btn" onclick="shareNote('${noteId}', '${title}')">📲 Compartir</button>
                            <button class="share-btn" onclick="copyLink('${noteId}')">🔗 Copiar Link</button>
                        </div>
                    `;
                    container.appendChild(card);
                }
            });

            document.getElementById('timeline-overlay').classList.add('open');
        }

        function closeTimeline() {
            document.getElementById('timeline-overlay').classList.remove('open');
            window.history.pushState(null, null, ' ');
        }

        function shareNote(id, title) {
            const url = `${window.location.origin}${window.location.pathname}#${id}`;
            const text = `Visto en La Nube de Wilson: ${title}`;
            if (navigator.share) {
                navigator.share({ title: 'La Nube de Wilson', text: text, url: url });
            } else {
                window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text + " " + url)}`);
            }
        }

        function copyLink(id) {
            const url = `${window.location.origin}${window.location.pathname}#${id}`;
            navigator.clipboard.writeText(url);
            alert("¡Link copiado para compartir!");
        }

        function checkDeepLinking() {
            const hash = window.location.hash;
            if (hash && hash.startsWith('#nota-')) {
                openTimeline('all');
                setTimeout(() => {
                    const el = document.getElementById(hash.substring(1));
                    if (el) el.scrollIntoView({ behavior: 'smooth' });
                }, 800);
            }
        }

        async function updateTicker() {
    try {
        const [b, c, bt, et] = await Promise.all([
            fetch('https://api.bluelytics.com.ar/v2/latest').then(r=>r.json()),
            fetch('https://api.exchangerate-api.com/v4/latest/USD').then(r=>r.json()),
            fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT').then(r=>r.json()),
            fetch('https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT').then(r=>r.json())
        ]);
        const r = c.rates, blue = b.blue.value_sell;
        document.getElementById('main-ticker').innerText = `DÓLAR BLUE: $${blue} • EURO: $${b.blue_euro.value_sell} • REAL: $${(blue/r.BRL).toFixed(2)} • P.CHILENO: $${(blue/r.CLP).toFixed(2)} • P.URUGUAYO: $${(blue/r.UYU).toFixed(2)} • P.MEXICANO: $${(blue/r.MXN).toFixed(2)} • P.COLOMBIANO: $${(blue/r.COP).toFixed(2)} • P.PERUANO: $${(blue/r.PEN).toFixed(2)} • P.CANADIENSE: $${(blue/r.CAD).toFixed(2)} • WON (KRW): ₩${r.KRW} • YEN (JPY): ¥${r.JPY} • BTC: U$D ${parseFloat(bt.price).toLocaleString()} • ETH: U$D ${parseFloat(et.price).toLocaleString()} • LA NUBE DE WILSON • `;
    } catch (e) {}
}

        function startSponsors() {
            const box = document.getElementById('sponsor-ad');
            let idx = 0;
            if (sponsors.length === 0) return;
            
            const show = () => {
                const col = sponsors[idx].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const url = col[0].replace(/"/g, '');
                box.innerHTML = `<img src="${url}" style="height:100%; width:auto; animation: fadeIn 1s">`;
                idx = (idx + 1) % sponsors.length;
            };
            show();
            setInterval(show, 6000);
        }

        window.onload = () => {
            fetchData();
            updateTicker();
            setInterval(updateTicker, 60000);
        };
        // --- LÓGICA DEL DIAL DE RADIOS ---
        function toggleVibeMenu() {
            const sidebar = document.getElementById('vibe-sidebar');
            if(sidebar) sidebar.classList.toggle('open');
        }

        function changeVibe(videoId, vibeName) {
            const player = document.getElementById('player-yt');
            if(player) {
                // Cambia el video y asegura que suene (mute=0)
                player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0&enablejsapi=1`;
                
                // Actualiza el texto de lo que suena
                const ticker = document.getElementById('main-ticker');
                if(ticker) ticker.innerText = `SINTONIZASTE: ${vibeName.toUpperCase()} • LA NUBE DE WILSON • CONECTANDO...`;
                
                // Cierra el menú y cambia a la señal de YouTube
                toggleVibeMenu();
                switchSignal('yt');
            }
        }
    </script>

    <style>
        @keyframes fadeIn { from {opacity: 0} to {opacity: 1} }
    </style>
</body>
</html>

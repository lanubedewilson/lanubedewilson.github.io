<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Nube de Wilson | San Juan</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050a05;
            --highlight: #d4e157;
            --accent-green: #9fb69f;
            --nube-cyan: #00d4ff;
            --white-bone: #f5f5f5;
        }

        * { box-sizing: border-box; }
        body { 
            background-color: var(--bg-dark); 
            color: var(--white-bone); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* HEADER */
        header { 
            background-color: #000; padding: 10px 5%; display: flex; 
            justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--highlight); position: sticky; top: 0; z-index: 100;
        }
        .logo { font-family: 'Bebas Neue', cursive; font-size: 2rem; color: var(--highlight); margin: 0; text-decoration: none; }
        .logo span { color: var(--accent-green); font-weight: normal; }

        .signal-selector { display: flex; gap: 8px; align-items: center; }
        
        /* BOTÓN AMARILLO CON LATIDO CELESTE */
        @keyframes pulse-vibe {
            0% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.7); transform: scale(1); }
            70% { box-shadow: 0 0 0 10px rgba(0, 212, 255, 0); transform: scale(1.03); }
            100% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0); transform: scale(1); }
        }

        #btn-vibe {
            background: var(--highlight); color: #000; border: 2px solid var(--nube-cyan) !important;
            font-size: 0.7rem; font-weight: bold; padding: 8px 15px; border-radius: 4px;
            cursor: pointer; text-transform: uppercase; animation: pulse-vibe 2s infinite ease-out;
        }

        #btn-kick {
            background: #111; color: #555; border: none; font-size: 0.7rem; 
            font-weight: bold; padding: 8px 15px; border-radius: 4px; cursor: pointer;
        }
        #btn-kick.active { background: #555; color: #fff; }

        .dot { width: 8px; height: 8px; background: #ff0000; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .dot.live { background: #00ff00; box-shadow: 0 0 10px #00ff00; }

        /* VIDEO Y TICKER */
        .main-stage { position: relative; width: 100%; background: #000; aspect-ratio: 16/9; max-height: 50vh; }
        .player-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; object-fit: cover; }
        .player-frame.active { display: block; }

        .ticker-wrap { background: #000; border-bottom: 1px solid #1a261a; overflow: hidden; padding: 8px 0; }
        .ticker { display: inline-block; white-space: nowrap; animation: tickerMove 40s linear infinite; color: var(--highlight); font-weight: bold; font-size: 0.85rem; }
        @keyframes tickerMove { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* SECCIÓN AUSPICIANTES */
        .sponsors-container { background: rgba(255,255,255,0.03); padding: 12px 0; border-bottom: 1px solid #222; }
        .sponsors-title { font-size: 0.6rem; color: #666; text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
        .sponsors-track { display: flex; justify-content: center; gap: 25px; align-items: center; }
        .sponsor-logo { height: 35px; filter: grayscale(1) brightness(1.2); opacity: 0.7; transition: 0.3s; }
        .sponsor-logo:hover { filter: grayscale(0); opacity: 1; }

        /* BOTÓN FEED MAESTRO */
        .feed-master-access {
            display: flex; align-items: center; background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--nube-cyan); padding: 20px; margin: 25px auto;
            border-radius: 15px; cursor: pointer; transition: 0.3s; width: 90%; max-width: 600px;
        }
        .feed-master-access:hover { background: rgba(0, 212, 255, 0.1); transform: translateY(-3px); }
        .feed-text-group { display: flex; flex-direction: column; margin-left: 15px; }
        .feed-main-title { font-family: 'Bebas Neue'; font-size: 1.8rem; color: #fff; line-height: 1; }
        .feed-description { font-size: 0.9rem; color: #00ffcc; margin-top: 4px; }

        /* SIDEBAR VIBRAS */
        #vibe-sidebar {
            position: fixed; top: 0; right: -100%; width: 50%; height: 100%;
            background: rgba(5, 10, 5, 0.95); backdrop-filter: blur(20px); z-index: 1000;
            transition: 0.5s ease; border-left: 1px solid var(--highlight);
        }
        #vibe-sidebar.open { right: 0; }
        .vibe-header { font-family: 'Bebas Neue'; font-size: 1.5rem; color: var(--nube-cyan); padding: 40px 20px 20px; text-align: center; }
        .vibe-container { padding: 20px; overflow-y: auto; height: calc(100% - 100px); }
        .vibe-item { padding: 15px; background: rgba(255,255,255,0.05); margin-bottom: 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .vibe-item:hover { background: rgba(0, 212, 255, 0.1); }

        /* TIMELINE OVERLAY */
        #timeline-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 2000; display: none; overflow-y: auto; padding: 50px 5%; }
        #timeline-overlay.open { display: block; }
        .close-timeline { position: fixed; top: 20px; right: 20px; font-size: 3rem; color: var(--highlight); cursor: pointer; }
        .note-card { background: #111; padding: 20px; border-radius: 12px; margin-bottom: 30px; border-left: 5px solid var(--highlight); text-align: left; }
        .note-img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; }
        
        #initial-loop { pointer-events: none; }
    </style>
</head>
<body>

    <header>
        <h1 class="logo" onclick="location.reload()" style="cursor: pointer;">LA NUBE <span>DE WILSON</span></h1>
        <div class="signal-selector">
            <button id="btn-kick" onclick="switchSignal('kick')"><span id="live-dot" class="dot"></span> STREAM</button>
            <button id="btn-vibe" onclick="toggleVibeMenu()">SELECCIONA TU VIBRA</button>
        </div>
    </header>

    <div id="vibe-sidebar">
        <div class="vibe-header">DIAL DE VIBRAS</div>
        <div class="vibe-container">
            <div class="vibe-item" onclick="changeVibe('36YnV9STBqc', 'La Buena Vida')"><span>🟡 La Buena Vida</span></div>
            <div class="vibe-item" onclick="changeVibe('8zRR2_6aRNE', 'Fogón')"><span>🔥 Fogón</span></div>
            <div class="vibe-item" onclick="changeVibe('rFYVKNsJT4k', 'Groove Pop')"><span>🎵 Groove Pop</span></div>
            <div class="vibe-item" onclick="changeVibe('q1VQ4q-ysRQ', 'Canal 8 SJ')"><span>📺 Canal 8 San Juan</span></div>
            <div class="vibe-item" onclick="changeVibe('cb12KmMMDJA', 'TN Noticias')"><span>📰 TN en Vivo</span></div>
        </div>
        <button onclick="toggleVibeMenu()" style="width:100%; padding:15px; background:#222; color:#eee; border:none; cursor:pointer; font-family:'Bebas Neue';">CERRAR DIAL</button>
    </div>

    <div class="main-stage">
        <video id="initial-loop" class="player-frame active" autoplay loop muted playsinline>
            <source src="La Nube.mp4" type="video/mp4">
        </video>
        <iframe id="player-yt" class="player-frame" src="" allow="autoplay"></iframe>
        <iframe id="player-kick" class="player-frame" src="https://player.kick.com/lanubedewilson" allowfullscreen="true"></iframe>
        <audio id="bg-audio" loop><source src="https://ice1.somafm.com/indiepop-128-mp3" type="audio/mpeg"></audio>
    </div>

    <div class="ticker-wrap">
        <div class="ticker" id="main-ticker">CARGANDO DATOS FINANCIEROS Y NOTICIAS...</div>
    </div>

    <div class="sponsors-container">
        <div class="sponsors-title">Acompañan a La Nube</div>
        <div class="sponsors-track">
            <img src="https://lanubedewilson.github.io/img/sj-gob.png" class="sponsor-logo" alt="Gobierno San Juan">
        </div>
    </div>

    <main>
        <div class="feed-master-access" onclick="openTimeline('all')">
            <div style="font-size: 35px;">📰</div>
            <div class="feed-text-group">
                <span class="feed-main-title">EL FEED DE LA NUBE</span>
                <span class="feed-description">Artículos, cápsulas y la señal de San Juan</span>
            </div>
        </div>
    </main>

    <div id="timeline-overlay">
        <span class="close-timeline" onclick="closeTimeline()">×</span>
        <div id="timeline-content" style="max-width: 700px; margin: 40px auto;"></div>
    </div>

    <script>
        let allNews = [];
        const bgAudio = document.getElementById('bg-audio');

        function switchSignal(type) {
            const pk = document.getElementById('player-kick');
            const py = document.getElementById('player-yt');
            const loop = document.getElementById('initial-loop');
            const bk = document.getElementById('btn-kick');
            const bv = document.getElementById('btn-vibe');

            [pk, py, loop].forEach(el => el.classList.remove('active'));
            bk.classList.remove('active');
            bv.classList.remove('active');

            if (type === 'kick') {
                pk.classList.add('active');
                bk.classList.add('active');
                bgAudio.pause();
                py.src = "";
            } else if (type === 'yt') {
                py.classList.add('active');
                bv.classList.add('active');
                bgAudio.pause();
            }
        }

        async function fetchData() {
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQzBWeCou5kJh15fRReZ85IvkrYGDsWKwzBQjxaF50y9VuGXd2Sen6Aev-nBlLr7MbLjsdOMDYtlnsE/pub?output=csv&t=' + Date.now();
            try {
                const res = await fetch(url);
                const text = await res.text();
                allNews = text.split('\n').slice(1).filter(r => r.trim() !== '').reverse();
                
                let isLive = allNews.some(row => row.split(',')[3]?.trim().toUpperCase() === 'VIVO');
                document.getElementById('live-dot').classList.toggle('live', isLive);
            } catch (e) { console.error("Error en feed:", e); }
        }

        async function updateTicker() {
            try {
                const res = await fetch('https://api.bluelytics.com.ar/v2/latest');
                const data = await res.json();
                if(data) {
                    const blue = data.blue;
                    document.getElementById('main-ticker').innerText = `DÓLAR BLUE: COMPRA $${blue.value_buy} / VENTA $${blue.value_sell} • EURO BLUE: $${data.blue_euro.value_sell} • LA NUBE DE WILSON • SAN JUAN ARGENTINA • `;
                }
            } catch (e) {
                document.getElementById('main-ticker').innerText = `LA NUBE DE WILSON • SINTONIZÁ TU VIBRA • SAN JUAN ARGENTINA • `;
            }
        }

        function openTimeline(cat) {
            const container = document.getElementById('timeline-content');
            container.innerHTML = '';
            allNews.forEach(row => {
                const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (col[3]?.trim().toLowerCase() === 'publicar') {
                    const card = document.createElement('div');
                    card.className = 'note-card';
                    const imgUrl = col[5]?.trim().replace(/"/g, '');
                    card.innerHTML = `
                        ${imgUrl ? `<img src="${imgUrl}" class="note-img">` : ''}
                        <h2 style="font-family:'Bebas Neue'; color:#fff; font-size:2.2rem; margin:10px 0;">${col[0].replace(/"/g,'')}</h2>
                        <div style="color:var(--accent-green); line-height:1.6; font-size:1.1rem;">${col[1].replace(/"/g,'')}</div>
                    `;
                    container.appendChild(card);
                }
            });
            document.getElementById('timeline-overlay').classList.add('open');
        }

        function closeTimeline() { document.getElementById('timeline-overlay').classList.remove('open'); }
        function toggleVibeMenu() { document.getElementById('vibe-sidebar').classList.toggle('open'); }
        
        function changeVibe(id, name) {
            const player = document.getElementById('player-yt');
            player.src = `https://www.youtube.com/embed/${id}?autoplay=1&mute=0&enablejsapi=1`;
            document.getElementById('main-ticker').innerText = `SINTONIZASTE: ${name.toUpperCase()} • LA NUBE DE WILSON • `;
            toggleVibeMenu();
            switchSignal('yt');
        }

        const unlock = () => { if(bgAudio.paused) bgAudio.play().catch(()=>{}); };
        ['click', 'touchstart', 'touchend'].forEach(ev => window.addEventListener(ev, unlock, {once:true}));

        setTimeout(() => {
            const loader = document.getElementById('loader-wrapper') || document.getElementById('loader');
            if(loader) loader.style.display = 'none';
        }, 6000);

        window.onload = () => { 
            fetchData(); 
            updateTicker(); 
            setInterval(updateTicker, 60000); 
        };
    </script>
</body>
</html>

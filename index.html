<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Nube de Wilson | v2.0 Timeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* =============================================
           VARIABLES Y RESET
        ============================================= */
        :root {
            --bg-dark: #050a05;
            --highlight: #d4e157;
            --accent-green: #9fb69f;
            --sj-gold: #ffcc00;
            --capsula-blue: #00d4ff;
            --musica-pink: #ff007a;
            --white-bone: #f5f5f5;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--white-bone);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* =============================================
           HEADER
        ============================================= */
        header {
            background-color: #000;
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--highlight);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Bebas Neue', cursive;
            font-size: 2rem;
            color: var(--highlight);
            margin: 0;
        }
        .logo span { color: var(--accent-green); font-weight: normal; }

        .signal-selector {
            display: flex;
            gap: 5px;
            background: #111;
            padding: 5px;
            border-radius: 8px;
        }

        .btn-signal {
            background: none;
            border: none;
            color: #555;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-signal.active { background: var(--highlight); color: #000; }

        /* LATIDO */
        .dot {
            width: 10px; height: 10px;
            background-color: #ff0000;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
            box-shadow: 0 0 12px #ff0000;
            animation: pulse-fade 1.5s infinite ease-in-out;
        }
        .dot.live {
            background-color: #00ff00;
            box-shadow: 0 0 15px #00ff00;
        }
        @keyframes pulse-fade {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* =============================================
           VIDEO PLAYER
        ============================================= */
        .main-stage {
            position: relative;
            width: 100%;
            background: #000;
            aspect-ratio: 16/9;
            max-height: 50vh;
        }

        .player-frame {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            display: none;
        }
        .player-frame.active { display: block; }

        video.player-frame { object-fit: cover; }

        /* =============================================
           OVERLAY "SEÑAL EN ESPERA"
        ============================================= */
        #no-signal-msg {
            position: fixed;
            inset: 0;
            background: rgba(5, 10, 5, 0.88);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 800;
        }
        #no-signal-msg.visible { display: flex; }

            max-width: 360px;
            width: 90%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(212, 22

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Nube de Wilson | Media Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #050a05; --header-bg: #0c140c; --accent-green: #9fb69f; --highlight: #d4e157; --sj-gold: #ffcc00; }
        body { background-color: var(--bg-dark); color: var(--accent-green); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        header { background-color: var(--header-bg); padding: 8px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--highlight); }
        .logo { font-family: 'Bebas Neue', cursive; font-size: 2.2rem; color: var(--highlight); margin: 0; }
        .logo span { color: var(--accent-green); font-weight: normal; }
        .signal-selector { display: flex; gap: 5px; background: #000; padding: 4px; border-radius: 6px; border: 1px solid var(--highlight); }
        .btn-signal { background: none; border: none; color: #4a5c4a; font-size: 0.75rem; font-weight: bold; padding: 5px 12px; cursor: pointer; border-radius: 4px; text-transform: uppercase; display: flex; align-items: center; gap: 5px; }
        .btn-signal.active { background: var(--highlight); color: #000; }
        .dot { width: 7px; height: 7px; background: #ff0000; border-radius: 50%; box-shadow: 0 0 5px #ff0000; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .video-box { width: 100%; background: #000; aspect-ratio: 16 / 9; position: relative; max-height: 50vh; }
        .player-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
        .player-frame.active { display: block; }
        .ticker-wrap { background: #000; border-bottom: 1px solid #1a261a; overflow: hidden; padding: 6px 0; height: 20px; }
        .ticker { display: inline-block; white-space: nowrap; animation: tickerMove 45s linear infinite; color: var(--highlight); font-size: 0.8rem; font-weight: bold; }
        @keyframes tickerMove { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .grid-info { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; max-width: 100%; margin: 0 auto; box-sizing: border-box; }
        .col-card { background: rgba(255,255,255,0.03); padding: 4px 12px; border-radius: 4px; border: 1px solid #1a261a; cursor: pointer; transition: 0.2s; width: fit-content; }
        .col-card:hover { border-color: var(--highlight); background: rgba(212, 225, 87, 0.2); }
        .col-title { font-family: 'Bebas Neue', cursive; font-size: 1.2rem; color: #fff; margin: 0; line-height: 1; }
        .col-subtitle { font-size: 0.65rem; color: var(--accent-green); font-style: italic; opacity: 0.7; margin-top: 2px; }
        .sponsor-container { display: flex; flex-direction: column; align-items: flex-start; width: 180px; }
        .side-title { font-family: 'Bebas Neue', cursive; font-size: 0.95rem; color: var(--highlight); margin-bottom: 4px; border-bottom: 1px solid #1a261a; width: 100%; }
        .sponsor-box { width: 100%; aspect-ratio: 16/9; background: #000; border: 1px solid #1a261a; border-radius: 4px; overflow: hidden; position: relative; }
        .sponsor-slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        .sponsor-slide.active { display: flex; align-items: center; justify-content: center; animation: fade 0.8s; }
        @keyframes fade { from {opacity: 0} to {opacity: 1} }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); backdrop-filter: blur(12px); }
        .modal-content { background: var(--bg-dark); margin: 0 auto; padding: 60px 20px; width: 90%; max-width: 700px; height: 100vh; overflow-y: auto; scroll-snap-type: y mandatory; }
        .close-modal { position: fixed; right: 20px; top: 10px; color: var(--highlight); font-size: 3rem; cursor: pointer; z-index: 2001; }
        .feed-item { min-height: 60vh; display: flex; flex-direction: column; justify-content: center; border-bottom: 1px solid #1a261a; padding: 40px 0; scroll-snap-align: start; }
        .feed-img { width: 100%; max-height: 350px; object-fit: cover; border-radius: 8px; margin-bottom: 20px; border: 1px solid #1a261a; }
        .feed-item h2 { font-family: 'Bebas Neue'; font-size: 2.4rem; color: var(--sj-gold); margin-bottom: 12px; line-height: 1.1; }
        .feed-item p { font-size: 1.15rem; line-height: 1.6; color: #ccc; }
    </style>
</head>
<body>
    <header>
        <h1 class="logo">LA NUBE <span>DE WILSON</span></h1>
        <div class="signal-selector">
            <button id="btn-kick" class="btn-signal" onclick="switchSignal('kick')"><span class="dot"></span> STREAM</button>
            <button id="btn-yt" class="btn-signal active" onclick="switchSignal('yt')">MUSICA 24/7</button>
        </div>
    </header>
    <div class="ticker-wrap"><div class="ticker" id="main-ticker">CONECTANDO...</div></div>
    <div class="video-box">
        <iframe id="player-yt" class="player-frame active" src="https://www.youtube.com/embed/36YnV9STBqc?autoplay=1&mute=1&playlist=36YnV9STBqc&loop=1&enablejsapi=1" allow="autoplay"></iframe>
        <iframe id="player-kick" class="player-frame" src="https://player.kick.com/lanubedewilson" allowfullscreen="true"></iframe>
    </div>
    <main class="grid-info">
        <div class="col-card" onclick="openFeed('data')"><div class="col-title">+ DATA</div><div class="col-subtitle"><i>Scrollear</i></div></div>
        <div class="col-card" onclick="openFeed('capsula')"><div class="col-title">CÁPSULAS</div><div class="col-subtitle"><i>Scrollear</i></div></div>
        <div class="col-card" onclick="openFeed('senalsj')"><div class="col-title">SEÑAL SJ</div><div class="col-subtitle"><i>Scrollear</i></div></div>
        <div class="col-card" onclick="openFeed('musica')"><div class="col-title">MUSICA</div><div class="col-subtitle"><i>Scrollear</i></div></div>
        <div class="sponsor-container"><div class="side-title">GRACIAS A...</div><div id="container-sponsor" class="sponsor-box"></div></div>
    </main>
    <div id="feedModal" class="modal"><span class="close-modal" onclick="closeModal()">×</span><div class="modal-content" id="modal-feed-body"></div></div>
    <script>
        let allDataRows = []; let sponsorRows = []; let sponsorIndex = 0; let sponsorInterval = null;
        function switchSignal(type) {
            const pk = document.getElementById('player-kick'), py = document.getElementById('player-yt');
            const bk = document.getElementById('btn-kick'), by = document.getElementById('btn-yt');
            if (type === 'kick') { 
                pk.classList.add('active'); py.classList.remove('active'); bk.classList.add('active'); by.classList.remove('active');
                py.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
            } else { 
                py.classList.add('active'); pk.classList.remove('active'); by.classList.add('active'); bk.classList.remove('active');
                py.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            }
        }
        async function loadData() {
            const newsUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQzBWeCou5kJh15fRReZ85IvkrYGDsWKwzBQjxaF50y9VuGXd2Sen6Aev-nBlLr7MbLjsdOMDYtlnsE/pub?output=csv&t=' + new Date().getTime();
            const sponsorsUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQzBWeCou5kJh15fRReZ85IvkrYGDsWKwzBQjxaF50y9VuGXd2Sen6Aev-nBlLr7MbLjsdOMDYtlnsE/pub?gid=1982401975&single=true&output=csv&t=' + new Date().getTime();
            try {
                const resNews = await fetch(newsUrl); const textNews = await resNews.text();
                allDataRows = textNews.split('\n').filter(r => r.trim() !== '').slice(1).reverse();
                const resSpo = await fetch(sponsorsUrl); const textSpo = await resSpo.text();
                sponsorRows = textSpo.split('\n').filter(r => r.trim() !== '').slice(1);
                if(sponsorRows.length > 0) renderSponsors(sponsorRows);
            } catch (e) { console.error(e); }
        }
        async function updateTicker() {
            try {
                const res = await fetch('https://api.bluelytics.com.ar/v2/latest'); const d = await res.json();
                document.getElementById('main-ticker').innerText = `DÓLAR BLUE: $${d.blue.value_sell} • DÓLAR OFICIAL: $${d.oficial.value_sell} • EURO: $${d.oficial_euro.value_sell} • BITCOIN: US$ 69.800 • REAL: $218 • PESO CHILENO: $1.28 • LA NUBE DE WILSON • SAN JUAN • ARGENTINA •`;
            } catch (e) { }
        }
        function openFeed(category) {
            const body = document.getElementById('modal-feed-body'); body.innerHTML = '';
            allDataRows.forEach(row => {
                const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (col.length >= 4 && col[3].trim().toLowerCase() === 'publicar') {
                    const title = col[0].replace(/^"|"$/g, ''), content = col[1].replace(/^"|"$/g, ''), cat = (col[4] || 'data').trim().toLowerCase(), imgUrl = (col[5] || '').replace(/^"|"$/g, '').trim();
                    if (cat === category) {
                        let imgHtml = imgUrl ? `<img src="${imgUrl}" class="feed-img" onerror="this.style.display='none'">` : '';
                        body.innerHTML += `<div class="feed-item">${imgHtml}<h2>${cat === 'senalsj' ? '🌞 ' : ''}${title}</h2><p>${content}</p></div>`;
                    }
                }
            });
            document.getElementById('feedModal').style.display = "block"; document.body.style.overflow = "hidden";
        }
        function closeModal() { document.getElementById('feedModal').style.display = "none"; document.body.style.overflow = "auto"; }
        function renderSponsors(rows) {
            const container = document.getElementById('container-sponsor'); container.innerHTML = ''; if(sponsorInterval) clearInterval(sponsorInterval);
            rows.forEach((row, i) => {
                const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); const url = col[0].replace(/^"|"$/g, '').trim(), tipo = (col[1] || 'imagen').replace(/^"|"$/g, '').trim().toLowerCase();
                if(!url) return;
                const div = document.createElement('div'); div.className = `sponsor-slide ${i === 0 ? 'active' : ''}`;
                div.innerHTML = tipo === 'video' ? `<video src="${url}" autoplay muted loop style="width:100%; height:100%; object-fit: contain;"></video>` : `<img src="${url}" style="width:100%; height:100%; object-fit: contain;">`;
                container.appendChild(div);
            });
            if(rows.length > 1) { sponsorInterval = setInterval(() => { const slides = document.querySelectorAll('.sponsor-slide'); slides[sponsorIndex].classList.remove('active'); sponsorIndex = (sponsorIndex + 1) % slides.length; slides[sponsorIndex].classList.add('active'); }, 7000); }
        }
        window.onload = () => { loadData(); updateTicker(); setInterval(loadData, 300000); setInterval(updateTicker, 60000); };
    </script>
</body>
</html>

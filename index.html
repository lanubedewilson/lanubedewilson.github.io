<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Nube de Wilson | Media Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050a05;      
            --header-bg: #0c140c;
            --accent-green: #9fb69f; 
            --highlight: #d4e157;    
            --text-muted: #4a5c4a;   
            --sj-gold: #ffcc00;
            --data-blue: #00bcff;
            --capsula-pink: #f093fb;
        }

        body {
            background-color: var(--bg-dark); color: var(--accent-green);
            font-family: 'Inter', sans-serif; margin: 0; padding: 0;
            display: flex; flex-direction: column; min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            background-color: var(--header-bg); padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--highlight); flex-wrap: wrap; gap: 20px;
        }
        .logo { font-family: 'Bebas Neue', cursive; font-size: 2.5rem; letter-spacing: 2px; margin: 0; color: var(--highlight); }
        .logo span { color: var(--accent-green); font-weight: normal; }

        .signal-selector { 
            display: flex; gap: 5px; background: #000; padding: 6px; 
            border-radius: 10px; border: 2px solid var(--highlight);
        }
        .btn-signal { 
            background: none; border: none; color: var(--text-muted); 
            font-size: 0.8rem; font-weight: bold; padding: 8px 18px; 
            cursor: pointer; border-radius: 6px; text-transform: uppercase; 
            transition: 0.3s;
        }
        .btn-signal.active { background: var(--highlight); color: #000; }

        /* Video y Ticker */
        .video-box { width: 100%; background: #000; aspect-ratio: 16 / 9; position: relative; max-height: 50vh; margin: 0 auto; }
        .player-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
        .player-frame.active { display: block; }

        .ticker-wrap { background: #000; border-bottom: 1px solid #1a261a; overflow: hidden; padding: 8px 0; }
        .ticker { display: inline-block; white-space: nowrap; animation: tickerMove 40s linear infinite; color: var(--highlight); font-size: 0.8rem; font-weight: bold; }
        @keyframes tickerMove { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* Grilla Principal Minimalista */
        .grid-info { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; 
            padding: 30px 3%; 
            max-width: 1600px; 
            margin: 0 auto; 
        }
        @media (max-width: 1200px) { .grid-info { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 768px) { .grid-info { grid-template-columns: 1fr; } }

        .col-card {
            background: rgba(255,255,255,0.02);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #1a261a;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 150px;
        }

        .col-title { font-family: 'Bebas Neue', cursive; font-size: 1.8rem; color: var(--highlight); margin-bottom: 15px; letter-spacing: 1px; }

        .btn-action { 
            background: none; border: 2px solid var(--highlight); color: var(--highlight); 
            font-size: 0.9rem; padding: 12px; cursor: pointer; border-radius: 8px; 
            font-weight: bold; transition: 0.3s; text-transform: uppercase;
        }
        .btn-action:hover { background: var(--highlight); color: #000; }

        /* MODAL DE SCROLL ADICTIVO */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        .modal-content { 
            background: var(--bg-dark); 
            margin: 0 auto; 
            padding: 60px 20px; 
            width: 90%; 
            max-width: 800px; 
            height: 100vh; 
            overflow-y: auto; 
            scroll-snap-type: y mandatory;
        }
        .close-modal { position: fixed; right: 30px; top: 20px; color: var(--highlight); font-size: 3rem; cursor: pointer; z-index: 2001; }
        
        .feed-item { 
            min-height: 60vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            border-bottom: 1px solid #1a261a; 
            padding: 40px 0;
            scroll-snap-align: start;
        }
        .feed-item h2 { font-family: 'Bebas Neue'; font-size: 2.8rem; line-height: 1.1; margin-bottom: 20px; }
        .feed-item p { font-size: 1.3rem; line-height: 1.6; color: #ccc; }

        /* Colores dinámicos en el Feed */
        .feed-data h2 { color: var(--data-blue); }
        .feed-capsula h2 { color: var(--capsula-pink); }
        .feed-senalsj h2 { color: var(--sj-gold); }
        .feed-senalsj { background: rgba(255, 204, 0, 0.02); }

        .sponsor-box { width: 100%; aspect-ratio: 16/9; background: #000; display: flex; align-items: center; justify-content: center; border: 1px solid #1a261a; border-radius: 8px; overflow: hidden; }
        .sponsor-slide { display: none; width: 100%; height: 100%; }
        .sponsor-slide.active { display: flex; align-items: center; justify-content: center; animation: fade 0.8s; }
        @keyframes fade { from {opacity: 0} to {opacity: 1} }

    </style>
</head>
<body>

    <header>
        <h1 class="logo">LA NUBE <span>DE WILSON</span></h1>
        
        <div class="signal-selector">
            <button id="btn-kick" class="btn-signal active" onclick="switchSignal('kick')">Stream</button>
            <button id="btn-yt" class="btn-signal" onclick="switchSignal('yt')">Musica 24/7</button>
        </div>

        <div id="weather-box" style="font-size: 0.9rem; color: var(--highlight); font-weight: bold;">SAN JUAN: 24°C</div>
    </header>

    <div class="ticker-wrap"><div class="ticker" id="main-ticker">CONECTANDO CON MERCADOS... • LA NUBE DE WILSON • SAN JUAN • ARGENTINA •</div></div>

    <div class="video-box">
        <iframe id="player-kick" class="player-frame active" src="https://player.kick.com/lanubedewilson" allowfullscreen="true"></iframe>
        <iframe id="player-yt" class="player-frame" src="https://www.youtube.com/embed/36YnV9STBqc?autoplay=1&mute=1" allowfullscreen></iframe>
    </div>

    <main class="grid-info">
        <div class="col-card">
            <div class="col-title">+ DATA</div>
            <button class="btn-action" onclick="openFeed('data')">SCROLLEAR + DATA</button>
        </div>

        <div class="col-card">
            <div class="col-title">CÁPSULAS</div>
            <button class="btn-action" onclick="openFeed('capsula')">SCROLLEAR CÁPSULAS</button>
        </div>

        <div class="col-card">
            <div class="col-title">SEÑAL SJ</div>
            <button class="btn-action" onclick="openFeed('senalsj')">VER MÁS SEÑAL SJ</button>
        </div>

        <div class="col-card" style="justify-content: flex-start; gap: 15px;">
            <div class="col-title">SONIDOS</div>
            <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM3M" width="100%" height="80" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            
            <div id="container-sponsor" class="sponsor-box">
                <p style="color:var(--text-muted); font-size:0.7rem;">ESPACIO PUBLICITARIO</p>
            </div>
        </div>
    </main>

    <div id="feedModal" class="modal">
        <span class="close-modal" onclick="closeModal()">×</span>
        <div class="modal-content" id="modal-feed-body"></div>
    </div>

    <script>
        let allDataRows = [];
        let sponsorIndex = 0;

        function switchSignal(type) {
            const pk = document.getElementById('player-kick'), py = document.getElementById('player-yt');
            const bk = document.getElementById('btn-kick'), by = document.getElementById('btn-yt');
            if (type === 'kick') { pk.classList.add('active'); py.classList.remove('active'); bk.classList.add('active'); by.classList.remove('active'); }
            else { py.classList.add('active'); pk.classList.remove('active'); by.classList.add('active'); bk.classList.remove('active'); }
        }

        async function loadData() {
            // TU LINK DE GOOGLE SHEETS PUBLISHED AS CSV
            const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQzBWeCou5kJh15fRReZ85IvkrYGDsWKwzBQjxaF50y9VuGXd2Sen6Aev-nBlLr7MbLjsdOMDYtlnsE/pub?output=csv&t=' + new Date().getTime();
            
            try {
                const res = await fetch(csvUrl);
                const text = await res.text();
                // Limpiamos filas vacías y guardamos
                allDataRows = text.split('\n').filter(row => row.trim() !== '').slice(1).reverse();
                console.log("Nube cargada con éxito");
            } catch (e) { 
                console.error("Error cargando la Nube:", e); 
            }
        }

        function openFeed(category) {
            const body = document.getElementById('modal-feed-body');
            body.innerHTML = '';
            let count = 0;

            allDataRows.forEach(row => {
                const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (col.length >= 4 && col[3].trim().toLowerCase() === 'publicar') {
                    const title = col[0].replace(/^"|"$/g, '');
                    const content = col[1].replace(/^"|"$/g, '');
                    const cat = (col[4] || 'data').trim().toLowerCase();

                    if (cat === category) {
                        count++;
                        let icon = "";
                        if (cat === 'senalsj') icon = "🌞 ";

                        body.innerHTML += `
                            <div class="feed-item feed-${cat}">
                                <h2>${icon}${title}</h2>
                                <p>${content}</p>
                            </div>`;
                    }
                }
            });

            if (count === 0) {
                body.innerHTML = `<div class="feed-item"><h2>PRÓXIMAMENTE</h2><p>Estamos procesando nuevas señales para esta categoría...</p></div>`;
            }

            document.getElementById('feedModal').style.display = "block";
            document.body.style.overflow = "hidden";
            body.scrollTop = 0;
        }

        function closeModal() {
            document.getElementById('feedModal').style.display = "none";
            document.body.style.overflow = "auto";
        }

        window.onload = () => { 
            loadData(); 
            // Ticker de mercados
            setInterval(() => {
                fetch('https://api.bluelytics.com.ar/v2/latest').then(r => r.json()).then(d => {
                    document.getElementById('main-ticker').innerText = `USD BLUE: $${d.blue.value_sell} • USD OFICIAL: $${d.oficial.value_sell} • LA NUBE DE WILSON • SAN JUAN • ARGENTINA •`;
                }).catch(() => {});
            }, 60000); 
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Nube de Wilson | v2.0 Timeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050a05;
            --highlight: #d4e157;
            --accent-green: #9fb69f;
            --sj-gold: #ffcc00;
            --capsula-blue: #00d4ff;
            --musica-pink: #ff007a;
            --white-bone: #f5f5f5;
        }

        * { box-sizing: border-box; }
        body { 
            background-color: var(--bg-dark); 
            color: var(--white-bone); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            height: 100vh;
        }

        /* HEADER Y SEÑALES */
        header { 
            background-color: #000; 
            padding: 10px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--highlight);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-family: 'Bebas Neue', cursive; font-size: 2rem; color: var(--highlight); margin: 0; }
        .logo span { color: var(--accent-green); font-weight: normal; }

        .signal-selector { display: flex; gap: 5px; background: #111; padding: 5px; border-radius: 8px; }
        .btn-signal { 
            background: none; border: none; color: #555; font-size: 0.7rem; 
            font-weight: bold; padding: 6px 12px; cursor: pointer; border-radius: 4px; 
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-signal.active { background: var(--highlight); color: #000; }
        
        /* EL LATIDO DEL BOTÓN AMARILLO (MEJORA SOLICITADA) */
        @keyframes pulse-yellow-btn {
            0% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.7); transform: scale(1); }
            70% { box-shadow: 0 0 0 10px rgba(0, 212, 255, 0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0); transform: scale(1); }
        }

        #btn-vibe {
            border: 2px solid #00d4ff !important; /* Marco color del Feed */
            animation: pulse-yellow-btn 2s infinite ease-out;
            transition: all 0.3s ease;
        }

        .dot { 
            width: 10px; height: 10px; background-color: #ff0000; border-radius: 50%; 
            display: inline-block; margin-right: 8px; vertical-align: middle;
            box-shadow: 0 0 12px #ff0000; animation: pulse-fade 1.5s infinite ease-in-out; 
        }
        .dot.live { background-color: #00ff00; box-shadow: 0 0 15px #00ff00; }
        
        @keyframes pulse-fade { 
            0%, 100% { opacity: 0.3; transform: scale(0.8); } 
            50% { opacity: 1; transform: scale(1.2); } 
        }

        /* VIDEO PLAYER Y TICKER */
        .main-stage { position: relative; width: 100%; background: #000; aspect-ratio: 16/9; max-height: 50vh; }
        .player-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; object-fit: cover; }
        .player-frame.active { display: block; }

        .ticker-wrap { background: #000; border-bottom: 1px solid #1a261a; overflow: hidden; padding: 6px 0; }
        .ticker { display: inline-block; white-space: nowrap; animation: tickerMove 30s linear infinite; color: var(--highlight); font-weight: bold; font-size: 0.85rem; }
        @keyframes tickerMove { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* EL FEED MASTER ACCESS */
        .feed-master-access {
            display: flex; align-items: center; background: rgba(255, 255, 255, 0.05);
            border: 2px solid #00d4ff; padding: 20px; margin: 20px auto;
            border-radius: 12px; cursor: pointer; transition: all 0.3s ease;
            width: 90%; max-width: 600px;
        }
        .feed-master-access:hover { background: rgba(0, 212, 255, 0.1); transform: scale(1.02); }
        .feed-text-group { display: flex; flex-direction: column; margin-left: 15px; text-align: left; }
        .feed-main-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: #fff; line-height: 1.1; }
        .feed-description { font-size: 0.9rem; color: #00ffcc; }

        /* SPONSORS */
        .sponsors-container {
            background: rgba(255, 255, 255, 0.03); border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding: 10px 0; margin: 5px 0 15px 0; width: 100%;
        }
        .sponsors-title { font-size: 0.65rem; color: #666; text-align: center; text-transform: uppercase; margin-bottom: 5px; }
        .sponsors-track { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .sponsor-logo { height: 30px; filter: grayscale(1) brightness(1.2); opacity: 0.7; transition: 0.3s; }

        /* TIMELINE CRISTAL */
        #timeline-overlay {
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%;
            background: rgba(5, 10, 5, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 500; transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1); overflow-y: auto; padding: 40px 5%;
        }
        #timeline-overlay.open { right: 0; }
        .close-timeline { position: fixed; top: 20px; right: 20px; font-size: 2.5rem; color: var(--highlight); cursor: pointer; z-index: 600; }

        .timeline-container { max-width: 700px; margin: 60px auto 0; border-left: 2px solid rgba(212, 225, 87, 0.3); padding-left: 30px; }
        .note-card { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 20px; margin-bottom: 40px; border-left: 5px solid var(--highlight); }
        .note-img { width: auto; max-width: 80%; max-height: 350px; border-radius: 8px; margin: 0 auto 15px; display: block; object-fit: contain; }
        .note-title { font-family: 'Bebas Neue'; font-size: 2rem; color: #fff; margin: 0; }
        .note-content { font-size: 1rem; line-height: 1.6; color: var(--accent-green); }

        /* SIDEBAR VIBRAS */
        #vibe-sidebar {
            position: fixed; top: 0; right: -45%; width: 45%; height: 100%;
            background: rgba(5, 10, 5, 0.8); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            z-index: 1000; transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1); display: flex; flex-direction: column;
            border-left: 1px solid rgba(212, 225, 87, 0.2);
        }
        #vibe-sidebar.open { right: 0; }
        .vibe-header { font-family: 'Bebas Neue'; font-size: 1.8rem; color: #00d4ff; padding: 80px 20px 20px; text-align: center; border-bottom: 1px solid rgba(0, 212, 255, 0.2); }
        .vibe-container { flex-grow: 1; overflow-y: auto; padding: 20px; scrollbar-width: none; }
        .vibe-container::-webkit-scrollbar { display: none; }
        .vibe-item { padding: 15px 10px; margin-bottom: 10px; cursor: pointer; border-radius: 6px; display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.03); border: 1px solid transparent; }
        .vibe-item:hover { background: rgba(0, 212, 255, 0.1); border-color: #00d4ff; }
        .vibe-item span { font-family: 'Bebas Neue'; font-size: 1.1rem; color: #fff; }

        #initial-loop { pointer-events: none; }
    </style>
</head>
<body>

    <header>
        <h1 class="logo" onclick="location.reload()" style="cursor: pointer;">LA NUBE <span>DE WILSON</span></h1>
        <div class="signal-selector">
            <button id="btn-kick" class="btn-signal" onclick="switchSignal('kick')"><span id="live-dot" class="dot"></span> STREAM</button>
            <button id="btn-vibe" class="btn-signal active" onclick="toggleVibeMenu()">SELECCIONA TU VIBRA</button>
        </div>
    </header>

    <div id="vibe-sidebar">
        <div class="vibe-header">SELECCIONA TU VIBRA</div>
        <div class="vibe-container">
            <div class="vibe-item" onclick="changeVibe('36YnV9STBqc', 'La Buena Vida')"><div style="width:4px; height:20px; background:#FFD700"></div><span>La Buena Vida</span></div>
            <div class="vibe-item" onclick="changeVibe('8zRR2_6aRNE', 'Fogón')"><div style="width:4px; height:20px; background:#8B4513"></div><span>Fogón</span></div>
            <div class="vibe-item" onclick="changeVibe('rFYVKNsJT4k', 'Groove Pop')"><div style="width:4px; height:20px; background:#FF1493"></div><span>Groove Pop</span></div>
            <div class="vibe-item" onclick="changeVibe('n4FUIcblaGU', 'Bossa Nova')"><div style="width:4px; height:20px; background:#32CD32"></div><span>Bossa Nova</span></div>
            <div class="vibe-item" onclick="changeVibe('2CLt-G_y8RA', 'Reggae')"><div style="width:4px; height:20px; background:#228B22"></div><span>Reggae</span></div>
            <div class="vibe-item" onclick="changeVibe('m3kR2KK8TEs', 'Artemis II')"><div style="width:4px; height:20px; background:#00BFFF"></div><span>Artemis II Live</span></div>
            <div class="vibe-item" onclick="changeVibe('q1VQ4q-ysRQ', 'Canal 8 San Juan')"><div style="width:4px; height:20px; background:#0045ad"></div><span>Canal 8 SJ</span></div>
            <div class="vibe-item" onclick="changeVibe('cb12KmMMDJA', 'TN Noticias')"><div style="width:4px; height:20px; background:#C0C0C0"></div><span>TN Noticias</span></div>
            <div class="vibe-item" onclick="changeVibe('bwvv4V5cbbM', 'LN +Musica')"><div style="width:4px; height:20px; background:#708090"></div><span>LN +Musica</span></div>
            <button onclick="toggleVibeMenu()" style="width:100%; margin-top:30px; background:none; border:1px solid #444; color:#888; padding:12px; cursor:pointer; border-radius:4px; font-family:'Bebas Neue';">CERRAR DIAL</button>
        </div>
    </div>

    <div class="main-stage">
        <video id="initial-loop" class="player-frame active" autoplay loop muted playsinline>
            <source src="La Nube.mp4" type="video/mp4">
        </video>
        <iframe id="player-yt" class="player-frame" src="" allow="autoplay"></iframe>
        <iframe id="player-kick" class="player-frame" src="https://player.kick.com/lanubedewilson" allowfullscreen="true"></iframe>
        <audio id="bg-audio" loop>
            <source src="https://ice1.somafm.com/indiepop-128-mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="ticker-wrap">
        <div class="ticker" id="main-ticker">CONECTANDO CON LA NUBE...</div>
    </div>

    <main>
        <div class="feed-master-access" onclick="openTimeline('all')">
            <div style="font-size: 35px;">📰</div>
            <div class="feed-text-group">
                <span class="feed-main-title">EL FEED DE LA NUBE</span>
                <span class="feed-description">Explorá datos, cápsulas y la señal de San Juan</span>
            </div>
        </div>
    </main>

    <div class="sponsors-container">
        <div class="sponsors-title">Acompañan a La Nube</div>
        <div class="sponsors-track">
            <img src="https://lanubedewilson.github.io/img/sj-gob.png" alt="Gobierno SJ" class="sponsor-logo">
            </div>
    </div>

    <div id="timeline-overlay">
        <span class="close-timeline" onclick="closeTimeline()">×</span>
        <div class="timeline-container" id="timeline-content"></div>
    </div>

    <script>
        let allNews = [];
        const bgAudio = document.getElementById('bg-audio');

        // --- UNIFICACIÓN DE SEÑALES ---
        function switchSignal(type) {
            const pk = document.getElementById('player-kick');
            const py = document.getElementById('player-yt');
            const loop = document.getElementById('initial-loop');
            const bk = document.getElementById('btn-kick');
            const bv = document.getElementById('btn-vibe');

            [pk, py, loop].forEach(el => el && el.classList.remove('active'));

            if (type === 'kick') {
                pk.classList.add('active');
                bk.classList.add('active');
                bv.classList.remove('active');
                bgAudio.pause();
                py.src = "";
            } else {
                py.classList.add('active');
                bv.classList.add('active');
                bk.classList.remove('active');
                bgAudio.pause();
            }
        }

        async function fetchData() {
            const newsUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQzBWeCou5kJh15fRReZ85IvkrYGDsWKwzBQjxaF50y9VuGXd2Sen6Aev-nBlLr7MbLjsdOMDYtlnsE/pub?output=csv&t=' + Date.now();
            try {
                const res = await fetch(newsUrl);
                const text = await res.text();
                allNews = text.split('\n').slice(1).filter(r => r.trim() !== '').reverse();
                
                let isLive = allNews.some(row => row.split(',')[3]?.trim().toUpperCase() === 'VIVO');
                const dot = document.getElementById('live-dot');
                if (isLive) dot.classList.add('live'); else dot.classList.remove('live');
            } catch (e) { console.log(e); }
        }

        function openTimeline(category) {
            const container = document.getElementById('timeline-content');
            container.innerHTML = '';
            allNews.forEach((row, index) => {
                const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (col.length < 4) return;
                const status = col[3].trim().toLowerCase();
                if (status === 'publicar') {
                    const card = document.createElement('div');
                    card.className = `note-card`;
                    card.innerHTML = `<h2 class="note-title">${col[0]}</h2><div class="note-content">${col[1]}</div>`;
                    container.appendChild(card);
                }
            });
            document.getElementById('timeline-overlay').classList.add('open');
        }

        function closeTimeline() { document.getElementById('timeline-overlay').classList.remove('open'); }

        function toggleVibeMenu() { document.getElementById('vibe-sidebar').classList.toggle('open'); }

        function changeVibe(videoId, vibeName) {
            const player = document.getElementById('player-yt');
            player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0&enablejsapi=1`;
            document.getElementById('main-ticker').innerText = `SINTONIZASTE: ${vibeName.toUpperCase()} • LA NUBE DE WILSON`;
            toggleVibeMenu();
            switchSignal('yt');
        }

        // --- DESBLOQUEADOR DE AUDIO ---
        const unlockAudio = () => { if (bgAudio.paused) bgAudio.play().catch(e => console.log(e)); };
        window.addEventListener('click', unlockAudio, { once: true });
        window.addEventListener('touchstart', unlockAudio, { once: true });
        window.addEventListener('touchend', unlockAudio, { once: true });

        // --- TIMEOUT LOADER ---
        setTimeout(() => {
            const loader = document.getElementById('loader-wrapper') || document.getElementById('loader');
            if (loader) { loader.style.display = 'none'; }
        }, 6000);

        window.onload = () => { fetchData(); };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Nube de Wilson - Media Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050a05;      
            --header-bg: #0c140c;
            --accent-green: #9fb69f; 
            --highlight: #d4e157;    
            --text-muted: #4a5c4a;   
        }

        body {
            background-color: var(--bg-dark); color: var(--accent-green);
            font-family: 'Inter', sans-serif; margin: 0; padding: 0;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        /* --- HEADER --- */
        header {
            background-color: var(--header-bg); padding: 10px 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #1a261a; flex-wrap: wrap;
        }
        .logo { font-family: 'Bebas Neue', cursive; font-size: 2rem; letter-spacing: 2px; margin: 0; color: var(--highlight); }
        .logo span { color: var(--accent-green); font-weight: normal; }

        .info-panel { display: flex; align-items: center; gap: 20px; }
        .weather-box { background: rgba(255,255,255,0.05); padding: 5px 15px; border-radius: 5px; font-size: 0.8rem; border-left: 2px solid var(--highlight); min-width: 150px; }
        .clock-box { font-weight: bold; color: var(--highlight); font-size: 1.1rem; }

        .signal-selector { display: flex; gap: 8px; background: #000; padding: 4px; border-radius: 20px; border: 1px solid #1a261a; }
        .btn-signal { background: none; border: none; color: var(--text-muted); font-size: 0.65rem; font-weight: bold; padding: 4px 10px; cursor: pointer; border-radius: 15px; text-transform: uppercase; }
        .btn-signal.active { background: var(--highlight); color: #000; }

        /* --- VIDEO & TICKER --- */
        .video-box { width: 100%; background: #000; aspect-ratio: 16 / 9; position: relative; max-height: 55vh; margin: 0 auto; }
        .player-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
        .player-frame.active { display: block; }

        .ticker-wrap { background: #000; border-bottom: 1px solid #1a261a; overflow: hidden; padding: 8px 0; }
        .ticker { display: inline-block; white-space: nowrap; animation: tickerMove 40s linear infinite; color: var(--highlight); font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        @keyframes tickerMove { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* --- REDACCIÓN --- */
        .grid-info { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 30px; padding: 25px 5%; max-width: 1200px; margin: 0 auto; }
        @media (max-width: 900px) { .grid-info { grid-template-columns: 1fr; } }

        .col-title { font-family: 'Bebas Neue', cursive; font-size: 1.4rem; color: var(--highlight); margin-bottom: 15px; border-bottom: 1px solid #1a261a; padding-bottom: 5px; }

        .news-item { background: rgba(255,255,255,0.02); margin-bottom: 12px; padding: 15px; border-radius: 6px; border-left: 3px solid var(--highlight); }
        .news-item h3 { font-size: 1.1rem; color: #fff; margin: 0 0 8px 0; }
        .news-item p { font-size: 0.9rem; line-height: 1.4; opacity: 0.8; height: 3.8em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .btn-read { background: none; border: 1px solid var(--highlight); color: var(--highlight); font-size: 0.7rem; padding: 5px 10px; cursor: pointer; margin-top: 10px; border-radius: 4px; }
        .btn-read:hover { background: var(--highlight); color: #000; }

        /* --- VENTANA MODAL (POPUP) --- */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background: var(--header-bg); margin: 5% auto; padding: 30px; border: 1px solid var(--highlight); width: 80%; max-width: 700px; border-radius: 10px; max-height: 80vh; overflow-y: auto; color: #fff; }
        .close-modal { color: var(--highlight); float: right; font-size: 2rem; font-weight: bold; cursor: pointer; }
        .modal-body h2 { font-family: 'Bebas Neue', cursive; font-size: 2rem; color: var(--highlight); margin-top: 0; }
        .modal-body p { line-height: 1.6; font-size: 1.1rem; white-space: pre-line; }

        footer { padding: 20px 5%; border-top: 1px solid #1a261a; text-align: center; color: var(--text-muted); font-size: 0.65rem; }
    </style>
</head>
<body>

    <header>
        <h1 class="logo">LA NUBE <span>DE WILSON</span></h1>
        <div class="signal-selector">
            <button id="btn-kick" class="btn-signal active" onclick="switchSignal('kick')">● VIVO</button>
            <button id="btn-yt" class="btn-signal" onclick="switchSignal('yt')">RADIO 24/7</button>
        </div>
        <div class="info-panel">
            <div class="weather-box" id="weather-display">Cargando clima...</div>
            <div class="clock-box" id="real-clock">00:00:00</div>
        </div>
    </header>

    <div class="ticker-wrap"><div class="ticker" id="main-ticker">CARGANDO DATOS... • LA NUBE DE WILSON • SAN JUAN •</div></div>

    <div class="video-box">
        <iframe id="player-kick" class="player-frame active" src="https://player.kick.com/lanubedewilson?parent=lanubedewilson.github.io" allowfullscreen="true"></iframe>
        <iframe id="player-yt" class="player-frame" src="https://www.youtube.com/embed/36YnV9STBqc?autoplay=1&mute=1" allowfullscreen></iframe>
    </div>

    <main class="grid-info">
        <div><div class="col-title">Señal SJ</div><p>San Juan, Argentina.</p></div>
        <div><div class="col-title">Redacción en Vivo</div><div id="news-container">Sincronizando...</div></div>
        <div><div class="col-title">Publicidad</div><div style="background:#111; height:80px; border:1px dashed #333; display:flex; align-items:center; justify-content:center; font-size:0.6rem; color:#444;">ESPACIO DISPONIBLE</div></div>
    </main>

    <div id="newsModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modal-body" class="modal-body">
                </div>
        </div>
    </div>

    <footer>&copy; 2026 La Nube de Wilson - San Juan, Argentina.</footer>

    <script>
        function switchSignal(type) {
            const playerKick = document.getElementById('player-kick');
            const playerYt = document.getElementById('player-yt');
            const btnKick = document.getElementById('btn-kick');
            const btnYt = document.getElementById('btn-yt');
            if (type === 'kick') {
                playerKick.classList.add('active'); playerYt.classList.remove('active');
                btnKick.classList.add('active'); btnYt.classList.remove('active');
                const ytSrc = playerYt.src; playerYt.src = ""; playerYt.src = ytSrc;
            } else {
                playerYt.classList.add('active'); playerKick.classList.remove('active');
                btnYt.classList.add('active'); btnKick.classList.remove('active');
            }
        }

        async function loadFinances() {
            try {
                const response = await fetch('https://api.bluelytics.com.ar/v2/latest');
                const data = await response.json();
                document.getElementById('main-ticker').innerHTML = `USD BLUE: $${data.blue.value_sell} • USD OFICIAL: $${data.oficial.value_sell} • EURO BLUE: $${data.blue_euro.value_sell} • LA NUBE DE WILSON • SAN JUAN •`;
            } catch (e) { console.log("Error finanzas"); }
        }

        async function loadNews() {
            const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQzBWeCou5kJh15fRReZ85IvkrYGDsWKwzBQjxaF50y9VuGXd2Sen6Aev-nBlLr7MbLjsdOMDYtlnsE/pub?output=csv&t=' + new Date().getTime();
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1).reverse(); 
                const container = document.getElementById('news-container');
                container.innerHTML = '';
                rows.forEach((row, index) => {
                    const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (columns.length >= 4 && columns[3].trim().toLowerCase() === 'publicar') {
                        const titulo = columns[0].replace(/^"|"$/g, '');
                        const contenido = columns[1].replace(/^"|"$/g, '');
                        const autor = columns[2].replace(/^"|"$/g, '');
                        
                        const item = document.createElement('div');
                        item.className = 'news-item';
                        item.innerHTML = `
                            <h3>${titulo}</h3>
                            <p>${contenido}</p>
                            <button class="btn-read" onclick="openModal('${titulo}', \`${contenido}\`, '${autor}')">LEER MÁS</button>
                        `;
                        container.appendChild(item);
                    }
                });
            } catch (e) { console.log("Error news"); }
        }

        function openModal(titulo, contenido, autor) {
            const modal = document.getElementById('newsModal');
            const body = document.getElementById('modal-body');
            body.innerHTML = `<h2>${titulo}</h2><p>${contenido}</p><hr style="border:0; border-top:1px solid #333; margin:20px 0;"><small>Publicado por: ${autor}</small>`;
            modal.style.display = "block";
        }

        function closeModal() {
            document.getElementById('newsModal').style.display = "none";
        }

        window.onclick = function(event) {
            const modal = document.getElementById('newsModal');
            if (event.target == modal) modal.style.display = "none";
        }

        // --- CLIMA ---
        const provincias = [{n: "San Juan", lat: -31.5, lon: -68.5}, {n: "Mendoza", lat: -32.8, lon: -68.8}, {n: "Buenos Aires", lat: -34.6, lon: -58.3}];
        let currentProv = 0;
        async function updateWeather() {
            const p = provincias[currentProv];
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${p.lat}&longitude=${p.lon}&current_weather=true`);
                const data = await res.json();
                document.getElementById('weather-display').innerHTML = `<strong>${p.n}:</strong> ${data.current_weather.temperature}°C`;
                currentProv = (currentProv + 1) % provincias.length;
            } catch (e) { }
        }

        window.onload = () => {
            loadFinances(); loadNews(); updateWeather();
            setInterval(() => { document.getElementById('real-clock').innerText = new Date().toLocaleTimeString(); }, 1000);
            setInterval(updateWeather, 5000);
            setInterval(loadNews, 120000);
        };
    </script>
</body>
</html>

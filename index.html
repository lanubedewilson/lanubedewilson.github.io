<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Nube de Wilson | Media Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050a05;      
            --header-bg: #0c140c;
            --accent-green: #9fb69f; 
            --highlight: #d4e157;    
            --sj-gold: #ffcc00;
        }

        body { background-color: var(--bg-dark); color: var(--accent-green); font-family: 'Inter', sans-serif; margin: 0; }

        header {
            background-color: var(--header-bg); padding: 10px 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--highlight);
        }
        .logo { font-family: 'Bebas Neue', cursive; font-size: 2.2rem; color: var(--highlight); margin: 0; }
        .logo span { color: var(--accent-green); font-weight: normal; }

        /* Selector de Señal con Punto Rojo */
        .signal-selector { display: flex; gap: 5px; background: #000; padding: 5px; border-radius: 8px; border: 1px solid var(--highlight); }
        .btn-signal { 
            background: none; border: none; color: #4a5c4a; font-size: 0.75rem; font-weight: bold; 
            padding: 6px 12px; cursor: pointer; border-radius: 4px; text-transform: uppercase; transition: 0.3s;
            display: flex; align-items: center; gap: 6px;
        }
        .btn-signal.active { background: var(--highlight); color: #000; }
        
        .dot { width: 8px; height: 8px; background: #ff0000; border-radius: 50%; display: inline-block; box-shadow: 0 0 8px #ff0000; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .video-box { width: 100%; background: #000; aspect-ratio: 16 / 9; position: relative; max-height: 50vh; }
        .player-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
        .player-frame.active { display: block; }

        .ticker-wrap { background: #000; border-bottom: 1px solid #1a261a; overflow: hidden; padding: 6px 0; }
        .ticker { display: inline-block; white-space: nowrap; animation: tickerMove 40s linear infinite; color: var(--highlight); font-size: 0.8rem; }
        @keyframes tickerMove { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* Grilla de Cuadros Ajustados (Fit-Content) */
        .grid-info { 
            display: flex; flex-wrap: wrap; gap: 15px; padding: 20px 5%; justify-content: flex-start;
        }

        .col-card {
            background: rgba(255,255,255,0.03); padding: 8px 15px; border-radius: 6px;
            border: 1px solid #1a261a; cursor: pointer; transition: 0.2s; width: fit-content;
        }
        .col-card:hover { border-color: var(--highlight); background: rgba(212, 225, 87, 0.1); }
        .col-card:hover .col-title { color: var(--highlight); }

        .col-title { font-family: 'Bebas Neue', cursive; font-size: 1.4rem; color: #fff; margin: 0; transition: 0.3s; }
        .col-subtitle { font-size: 0.75rem; color: var(--accent-green); font-style: italic; opacity: 0.7; }

        /* Secciones Laterales Estilizadas */
        .side-section { width: 100%; max-width: 300px; }
        .side-title { font-family: 'Bebas Neue', cursive; font-size: 1.1rem; color: var(--highlight); margin-bottom: 5px; opacity: 0.8; }
        .sponsor-box { width: 100%; aspect-ratio: 16/9; background: #000; border: 1px solid #1a261a; border-radius: 4px; overflow: hidden; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); backdrop-filter: blur(10px); }
        .modal-content { background: var(--bg-dark); margin: 0 auto; padding: 40px 20px; width: 90%; max-width: 700px; height: 100vh; overflow-y: auto; }
        .close-modal { position: fixed; right: 25px; top: 15px; color: var(--highlight); font-size: 2.5rem; cursor: pointer; }
        .feed-item { min-height: 50vh; display: flex; flex-direction: column; justify-content: center; border-bottom: 1px solid #1a261a; padding: 30px 0; }
        .feed-item h2 { font-family: 'Bebas Neue'; font-size: 2.2rem; color: var(--sj-gold); margin-bottom: 10px; }
        .feed-item p { font-size: 1.1rem; line-height: 1.5; color: #ccc; }
    </style>
</head>
<body>

    <header>
        <h1 class="logo">LA NUBE <span>DE WILSON</span></h1>
        <div class="signal-selector">
            <button id="btn-kick" class="btn-signal" onclick="switchSignal('kick')">
                <span class="dot"></span> STREAM
            </button>
            <button id="btn-yt" class="btn-signal active" onclick="switchSignal('yt')">MUSICA 24/7</button>
        </div>
    </header>

    <div class="ticker-wrap"><div class="ticker" id="main-ticker">CONECTANDO SEÑAL... • LA NUBE DE WILSON • SAN JUAN •</div></div>

    <div class="video-box">
        <iframe id="player-yt" class="player-frame active" src="https://www.youtube.com/embed/36YnV9STBqc?autoplay=1&mute=0&enablejsapi=1" allow="autoplay"></iframe>
        <iframe id="player-kick" class="player-frame" src="https://player.kick.com/lanubedewilson" allowfullscreen="true"></iframe>
    </div>

    <main class="grid-info">
        <div class="col-card" onclick="openFeed('data')">
            <div class="col-title">+ DATA</div>
            <div class="col-subtitle"><i>Scrollear +Data</i></div>
        </div>

        <div class="col-card" onclick="openFeed('capsula')">
            <div class="col-title">CÁPSULAS</div>
            <div class="col-subtitle"><i>Scrollear Cápsulas</i></div>
        </div>

        <div class="col-card" onclick="openFeed('senalsj')">
            <div class="col-title">SEÑAL SJ</div>
            <div class="col-subtitle"><i>Scrollear Señal SJ</i></div>
        </div>

        <div class="side-section">
            <div class="side-title">GRACIAS A...</div>
            <div id="container-sponsor" class="sponsor-box">
                <p style="color:#222; font-size:0.6rem; text-align:center; padding-top:20%;">Espacio Publicitario</p>
            </div>
        </div>
    </main>

    <div id="feedModal" class="modal">
        <span class="close-modal" onclick="closeModal()">×</span>
        <div class="modal-content" id="modal-feed-body"></div>
    </div>

    <script>
        let allDataRows = [];
        let sponsorIndex = 0;

        function switchSignal(type) {
            const pk = document.getElementById('player-kick'), py = document.getElementById('player-yt');
            const bk = document.getElementById('btn-kick'), by = document.getElementById('btn-yt');
            if (type === 'kick') { 
                pk.classList.add('active'); py.classList.remove('active'); 
                bk.classList.add('active'); by.classList.remove('active');
                py.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
            } else { 
                py.classList.add('active'); pk.classList.remove('active'); 
                by.classList.add('active'); bk.classList.remove('active'); 
            }
        }

        async function loadData() {
            const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQzBWeCou5kJh15fRReZ85IvkrYGDsWKwzBQjxaF50y9VuGXd2Sen6Aev-nBlLr7MbLjsdOMDYtlnsE/pub?output=csv&t=' + new Date().getTime();
            try {
                const res = await fetch(csvUrl);
                const text = await res.text();
                allDataRows = text.split('\n').filter(r => r.trim() !== '').slice(1).reverse();
                
                let sponsors = [];
                allDataRows.forEach(row => {
                    const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (col.length >= 5 && col[4].trim().toLowerCase() === 'sponsor') {
                        sponsors.push(col[1].replace(/^"|"$/g, ''));
                    }
                });
                if(sponsors.length > 0) renderSponsors(sponsors);
            } catch (e) { console.error(e); }
        }

        function openFeed(category) {
            const body = document.getElementById('modal-feed-body');
            body.innerHTML = '';
            allDataRows.forEach(row => {
                const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (col.length >= 4 && col[3].trim().toLowerCase() === 'publicar') {
                    const title = col[0].replace(/^"|"$/g, ''), content = col[1].replace(/^"|"$/g, ''), cat = (col[4] || 'data').trim().toLowerCase();
                    if (cat === category) {
                        body.innerHTML += `<div class="feed-item"><h2>${cat === 'senalsj' ? '🌞 ' : ''}${title}</h2><p>${content}</p></div>`;
                    }
                }
            });
            document.getElementById('feedModal').style.display = "block";
            document.body.style.overflow = "hidden";
        }

        function closeModal() { document.getElementById('feedModal').style.display = "none"; document.body.style.overflow = "auto"; }

        function renderSponsors(imgs) {
            const container = document.getElementById('container-sponsor');
            container.innerHTML = '';
            imgs.forEach((url, i) => {
                const div = document.createElement('div');
                div.className = `sponsor-slide ${i === 0 ? 'active' : ''}`;
                div.innerHTML = `<img src="${url}" style="width:100%; height:100%; object-fit: contain;">`;
                container.appendChild(div);
            });
            setInterval(() => {
                const slides = document.querySelectorAll('.sponsor-slide');
                if(slides.length > 1) {
                    slides[sponsorIndex].classList.remove('active');
                    sponsorIndex = (sponsorIndex + 1) % slides.length;
                    slides[sponsorIndex].classList.add('active');
                }
            }, 5000);
        }

        window.onload = loadData;
    </script>
</body>
</html>

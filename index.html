<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Nube de Wilson - Media Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050a05;      
            --header-bg: #0c140c;
            --accent-green: #9fb69f; 
            --highlight: #d4e157;    
            --text-muted: #4a5c4a;   
        }

        body {
            background-color: var(--bg-dark); color: var(--accent-green);
            font-family: 'Inter', sans-serif; margin: 0; padding: 0;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        header {
            background-color: var(--header-bg); padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--highlight); flex-wrap: wrap; gap: 20px;
        }
        .logo { font-family: 'Bebas Neue', cursive; font-size: 2.5rem; letter-spacing: 2px; margin: 0; color: var(--highlight); }
        .logo span { color: var(--accent-green); font-weight: normal; }

        .signal-selector { 
            display: flex; gap: 5px; background: #000; padding: 6px; 
            border-radius: 10px; border: 2px solid var(--highlight);
            box-shadow: 0 0 10px rgba(212, 225, 87, 0.3);
        }
        .btn-signal { 
            background: none; border: none; color: var(--text-muted); 
            font-size: 0.8rem; font-weight: bold; padding: 8px 18px; 
            cursor: pointer; border-radius: 6px; text-transform: uppercase; 
            transition: 0.3s;
        }
        .btn-signal.active { background: var(--highlight); color: #000; }

        .info-panel { display: flex; align-items: center; gap: 15px; }
        .weather-box { background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 5px; font-size: 0.8rem; border-left: 2px solid var(--highlight); min-width: 130px; }
        .clock-box { font-weight: bold; color: var(--highlight); font-size: 1.1rem; }

        .video-box { width: 100%; background: #000; aspect-ratio: 16 / 9; position: relative; max-height: 50vh; margin: 0 auto; }
        .player-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
        .player-frame.active { display: block; }

        .ticker-wrap { background: #000; border-bottom: 1px solid #1a261a; overflow: hidden; padding: 8px 0; }
        .ticker { display: inline-block; white-space: nowrap; animation: tickerMove 45s linear infinite; color: var(--highlight); font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        @keyframes tickerMove { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .grid-info { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; padding: 25px 3%; max-width: 1600px; margin: 0 auto; }
        @media (max-width: 1400px) { .grid-info { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { .grid-info { grid-template-columns: 1fr; } }

        .col-title { font-family: 'Bebas Neue', cursive; font-size: 1.4rem; color: var(--highlight); margin-bottom: 12px; border-bottom: 1px solid #1a261a; padding-bottom: 5px; }

        .news-item { background: rgba(255,255,255,0.02); margin-bottom: 12px; padding: 12px; border-radius: 6px; border-left: 3px solid var(--highlight); }
        .btn-read { background: none; border: 1px solid var(--highlight); color: var(--highlight); font-size: 0.65rem; padding: 4px 8px; cursor: pointer; margin-top: 8px; border-radius: 4px; }

        /* CARRUSEL DE SPONSORS */
        .sponsor-container { width: 100%; min-height: 180px; position: relative; overflow: hidden; border-radius: 8px; background: #000; display: flex; align-items: center; justify-content: center; border: 1px solid #1a261a; }
        .sponsor-slide { display: none; width: 100%; height: 100%; text-align: center; animation: fadeEffect 0.8s; }
        .sponsor-slide.active { display: flex; align-items: center; justify-content: center; }
        .sponsor-slide img, .sponsor-slide video { max-width: 100%; max-height: 180px; border-radius: 4px; }
        @keyframes fadeEffect { from { opacity: 0; } to { opacity: 1; } }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(5px); }
        .modal-content { background: var(--header-bg); margin: 5% auto; padding: 25px; border: 1px solid var(--highlight); width: 85%; max-width: 650px; border-radius: 10px; max-height: 80vh; overflow-y: auto; color: #fff; }
        .close-modal { color: var(--highlight); float: right; font-size: 2rem; cursor: pointer; }

        footer { padding: 20px 5%; border-top: 1px solid #1a261a; text-align: center; color: var(--text-muted); font-size: 0.7rem; }
    </style>
</head>
<body>

    <header>
        <h1 class="logo">LA NUBE <span>DE WILSON</span></h1>
        
        <div class="signal-selector">
            <button id="btn-kick" class="btn-signal active" onclick="switchSignal('kick')">Stream</button>
            <button id="btn-yt" class="btn-signal" onclick="switchSignal('yt')">Musica 24/7</button>
        </div>

        <div class="info-panel">
            <div class="weather-box" id="weather-display">Cargando clima...</div>
            <div class="clock-box" id="real-clock">00:00:00</div>
        </div>
    </header>

    <div class="ticker-wrap"><div class="ticker" id="main-ticker">SINCRONIZANDO MERCADOS... • LA NUBE DE WILSON • SAN JUAN •</div></div>

    <div class="video-box">
        <iframe id="player-kick" class="player-frame active" src="https://player.kick.com/lanubedewilson?parent=lanubedewilson.github.io" allowfullscreen="true"></iframe>
        <iframe id="player-yt" class="player-frame" src="https://www.youtube.com/embed/36YnV9STBqc?autoplay=1&mute=1" allowfullscreen></iframe>
    </div>

    <main class="grid-info">
        <div>
            <div class="col-title">Música</div>
            <iframe style="border-radius:12px; margin-bottom:15px;" src="https://open.spotify.com/embed/playlist/37i9dQZEXR0A9dQZEXR0A9?utm_source=generator&theme=0" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            <div id="container-musica"></div>
        </div>

        <div><div class="col-title">Cápsulas</div><div id="container-capsula"></div></div>
        
        <div><div class="col-title">+ Data</div><div id="container-data"></div></div>

        <div>
            <div class="col-title">Señal SJ</div>
            <p style="font-size:0.8rem;">Transmitiendo desde San Juan, Argentina. Alta fidelidad en streaming 24/7.</p>
        </div>

        <div>
            <div class="col-title">Gracias a...</div>
            <div id="container-sponsor" class="sponsor-container">
                <p style="font-size:0.6rem; color:#333;">Espacio Publicitario</p>
            </div>
        </div>
    </main>

    <div id="newsModal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeModal()">×</span><div id="modal-body" class="modal-body"></div></div></div>

    <footer>© 2026 La Nube de Wilson - San Juan, Argentina.</footer>

    <script>
        let sponsorIndex = 0;
        let sponsors = [];

        function switchSignal(type) {
            const pk = document.getElementById('player-kick'), py = document.getElementById('player-yt');
            const bk = document.getElementById('btn-kick'), by = document.getElementById('btn-yt');
            if (type === 'kick') { pk.classList.add('active'); py.classList.remove('active'); bk.classList.add('active'); by.classList.remove('active'); py.src = py.src; }
            else { py.classList.add('active'); pk.classList.remove('active'); by.classList.add('active'); bk.classList.remove('active'); }
        }

        async function loadFinances() {
            try {
                const res = await fetch('https://api.bluelytics.com.ar/v2/latest');
                const d = await res.json();
                document.getElementById('main-ticker').innerHTML = `USD BLUE: $${d.blue.value_sell} • USD OFICIAL: $${d.oficial.value_sell} • EURO BLUE: $${d.blue_euro.value_sell} • LA NUBE DE WILSON • SAN JUAN • ARGENTINA •`;
            } catch (e) {}
        }

        async function loadNews() {
            const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQzBWeCou5kJh15fRReZ85IvkrYGDsWKwzBQjxaF50y9VuGXd2Sen6Aev-nBlLr7MbLjsdOMDYtlnsE/pub?output=csv&t=' + new Date().getTime();
            try {
                const res = await fetch(csvUrl);
                const data = await res.text();
                const rows = data.split('\n').slice(1).reverse(); 
                
                const cMus = document.getElementById('container-musica'), cCap = document.getElementById('container-capsula'), cDat = document.getElementById('container-data');
                cMus.innerHTML = ''; cCap.innerHTML = ''; cDat.innerHTML = '';
                const newSponsors = [];

                rows.forEach(row => {
                    const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (col.length >= 5 && col[3].trim().toLowerCase() === 'publicar') {
                        const t = col[0].replace(/^"|"$/g, ''), c = col[1].replace(/^"|"$/g, ''), a = col[2].replace(/^"|"$/g, ''), cat = col[4].trim().toLowerCase();
                        
                        if (cat === 'sponsor') {
                            newSponsors.push({type: c.toLowerCase().includes('mp4') ? 'video' : 'img', url: c});
                        } else {
                            const item = document.createElement('div'); item.className = 'news-item';
                            item.innerHTML = `<h3>${t}</h3><p style="font-size:0.85rem; height:2.8em; overflow:hidden; display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">${c}</p><button class="btn-read" onclick="openModal('${t}', \`${c}\`, '${a}')">LEER MÁS</button>`;
                            if (cat === 'musica') cMus.appendChild(item);
                            else if (cat === 'capsula') cCap.appendChild(item);
                            else if (cat === 'data') cDat.appendChild(item);
                        }
                    }
                });
                sponsors = newSponsors;
                if(sponsors.length > 0) renderSponsors();
            } catch (e) {}
        }

        function renderSponsors() {
            const container = document.getElementById('container-sponsor');
            container.innerHTML = '';
            sponsors.forEach((s, i) => {
                const div = document.createElement('div');
                div.className = `sponsor-slide ${i === 0 ? 'active' : ''}`;
                if(s.type === 'video') div.innerHTML = `<video src="${s.url}" autoplay muted loop playsinline></video>`;
                else div.innerHTML = `<img src="${s.url}" alt="Sponsor" onerror="this.parentElement.style.display='none'">`;
                container.appendChild(div);
            });
            if(sponsors.length > 1) {
                clearInterval(window.sponsorTimer);
                window.sponsorTimer = setInterval(rotateSponsors, 7000);
            }
        }

        function rotateSponsors() {
            const slides = document.querySelectorAll('.sponsor-slide');
            if (slides.length < 2) return;
            slides[sponsorIndex].classList.remove('active');
            sponsorIndex = (sponsorIndex + 1) % slides.length;
            slides[sponsorIndex].classList.add('active');
        }

        function openModal(t, c, a) { document.getElementById('modal-body').innerHTML = `<h2>${t}</h2><p style="line-height:1.6; font-size:1.1rem; white-space:pre-line;">${c}</p><hr style="border:0;border-top:1px solid #333;margin:20px 0;"><small>Por: ${a}</small>`; document.getElementById('newsModal').style.display = "block"; }
        function closeModal() { document.getElementById('newsModal').style.display = "none"; }
        window.onclick = e => { if (e.target.id == 'newsModal') closeModal(); }

        const provs = [{n: "San Juan", lat: -31.5, lon: -68.5}, {n: "Mendoza", lat: -32.8, lon: -68.8}, {n: "Bs. As.", lat: -34.6, lon: -58.3}];
        let cp = 0;
        async function updateWeather() {
            const p = provs[cp];
            try {
                const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${p.lat}&longitude=${p.lon}&current_weather=true`);
                const d = await r.json();
                document.getElementById('weather-display').innerHTML = `<strong>${p.n}:</strong> ${d.current_weather.temperature}°C`;
                cp = (cp + 1) % provs.length;
            } catch (e) {}
        }

        window.onload = () => {
            loadFinances(); loadNews(); updateWeather();
            setInterval(() => { document.getElementById('real-clock').innerText = new Date().toLocaleTimeString(); }, 1000);
            setInterval(updateWeather, 6000); setInterval(loadNews, 120000);
        };
    </script>
</body>
</html>
